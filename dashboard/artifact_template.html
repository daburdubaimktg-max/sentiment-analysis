<title>Dabur Social Listening</title>
<style>
  .viz-root {
    --surface-1: #fcfcfb; --page: #f9f9f7;
    --ink: #0b0b0b; --ink-2: #52514e; --muted: #898781;
    --grid: #e1e0d9; --baseline: #c3c2b7; --ring: rgba(11,11,11,0.10);
    --pos: #1baf7a; --neu: #898781; --neg: #e34948;
    --s1: #2a78d6; --s2: #1baf7a; --s3: #eda100; --s4: #008300;
    --s5: #4a3aa7; --s6: #e34948; --s7: #e87ba4; --s8: #eb6834;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    color: var(--ink); background: var(--page);
    padding: 20px; min-height: 100vh; box-sizing: border-box;
  }
  @media (prefers-color-scheme: dark) {
    .viz-root {
      --surface-1: #1a1a19; --page: #0d0d0d;
      --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
      --grid: #2c2c2a; --baseline: #383835; --ring: rgba(255,255,255,0.10);
      --pos: #199e70; --neu: #898781; --neg: #e66767;
      --s1: #3987e5; --s2: #199e70; --s3: #c98500; --s4: #008300;
      --s5: #9085e9; --s6: #e66767; --s7: #d55181; --s8: #d95926;
    }
  }
  :root[data-theme="dark"] .viz-root {
    --surface-1: #1a1a19; --page: #0d0d0d;
    --ink: #ffffff; --ink-2: #c3c2b7; --muted: #898781;
    --grid: #2c2c2a; --baseline: #383835; --ring: rgba(255,255,255,0.10);
    --pos: #199e70; --neu: #898781; --neg: #e66767;
    --s1: #3987e5; --s2: #199e70; --s3: #c98500; --s4: #008300;
    --s5: #9085e9; --s6: #e66767; --s7: #d55181; --s8: #d95926;
  }
  :root[data-theme="light"] .viz-root {
    --surface-1: #fcfcfb; --page: #f9f9f7;
    --ink: #0b0b0b; --ink-2: #52514e; --muted: #898781;
    --grid: #e1e0d9; --baseline: #c3c2b7; --ring: rgba(11,11,11,0.10);
    --pos: #1baf7a; --neu: #898781; --neg: #e34948;
    --s1: #2a78d6; --s2: #1baf7a; --s3: #eda100; --s4: #008300;
    --s5: #4a3aa7; --s6: #e34948; --s7: #e87ba4; --s8: #eb6834;
  }
  .viz-root * { box-sizing: border-box; }
  .hdr { display: flex; flex-wrap: wrap; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  .hdr h1 { font-size: 20px; margin: 0; font-weight: 650; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--ring);
           color: var(--ink-2); background: var(--surface-1); }
  .sub { color: var(--muted); font-size: 12px; margin-bottom: 14px; }
  .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .filters select, .filters input {
    background: var(--surface-1); color: var(--ink); border: 1px solid var(--ring);
    border-radius: 8px; padding: 6px 10px; font-size: 12.5px; font-family: inherit;
  }
  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 14px; }
  .kpi { background: var(--surface-1); border: 1px solid var(--ring); border-radius: 12px; padding: 12px 14px; }
  .kpi .lbl { font-size: 11.5px; color: var(--muted); margin-bottom: 4px; }
  .kpi .val { font-size: 26px; font-weight: 650; line-height: 1.1; }
  .kpi .val.pos { color: var(--pos); } .kpi .val.neg { color: var(--neg); }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 12px; }
  .card { background: var(--surface-1); border: 1px solid var(--ring); border-radius: 12px; padding: 14px; min-width: 0; }
  .card h3 { margin: 0 0 10px; font-size: 13px; font-weight: 600; color: var(--ink-2); }
  .card.wide { grid-column: 1 / -1; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; font-size: 11.5px; color: var(--ink-2); margin-bottom: 8px; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .legend i { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
  /* horizontal stacked bars (div-based) */
  .hrow { display: grid; grid-template-columns: 130px 1fr 44px; align-items: center; gap: 8px; margin: 5px 0; font-size: 12px; }
  .hrow .rl { color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: right; }
  .hrow .rv { color: var(--muted); font-variant-numeric: tabular-nums; }
  .track { display: flex; gap: 2px; height: 16px; }
  .seg { border-radius: 4px; min-width: 3px; cursor: default; }
  .seg:hover { outline: 2px solid var(--surface-1); outline-offset: -1px; filter: brightness(1.08); }
  svg text { fill: var(--muted); font-size: 10.5px; font-family: inherit; }
  #tip { position: fixed; pointer-events: none; z-index: 50; background: var(--surface-1);
         border: 1px solid var(--ring); border-radius: 8px; padding: 7px 10px; font-size: 12px;
         color: var(--ink); box-shadow: 0 4px 14px rgba(0,0,0,.18); display: none; max-width: 300px; }
  table.tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tbl th { text-align: left; color: var(--muted); font-weight: 500; padding: 6px 8px; border-bottom: 1px solid var(--grid);
            position: sticky; top: 0; background: var(--surface-1); }
  .tbl td { padding: 6px 8px; border-bottom: 1px solid var(--grid); vertical-align: top; color: var(--ink-2); }
  .tbl td.orig { max-width: 260px; } .tbl td.trans { max-width: 260px; color: var(--ink); }
  .chip { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 11px; color: #fff; }
  .tblwrap { max-height: 420px; overflow: auto; border: 1px solid var(--grid); border-radius: 8px; }
  .empty { color: var(--muted); font-size: 12.5px; padding: 20px 0; text-align: center; }
</style>

<div class="viz-root">
  <div class="hdr">
    <h1>📡 Dabur International — Social Listening</h1>
    <span class="badge" id="snapshot-badge"></span>
  </div>
  <div class="sub" id="subtitle"></div>

  <div class="filters">
    <select id="f-range">
      <option value="all">All time</option>
      <option value="7">Last 7 days</option>
      <option value="30">Last 30 days</option>
      <option value="90">Last 90 days</option>
    </select>
    <select id="f-platform"><option value="">All platforms</option></select>
    <select id="f-entity">
      <option value="">Own + competitors</option>
      <option value="own">Own brands</option>
      <option value="competitor">Competitors</option>
    </select>
    <select id="f-market"><option value="">All markets</option></select>
    <select id="f-sentiment">
      <option value="">All sentiment</option>
      <option value="positive">Positive</option>
      <option value="neutral">Neutral</option>
      <option value="negative">Negative</option>
    </select>
    <select id="f-tag"><option value="">All tags</option></select>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="grid">
    <div class="card wide">
      <h3>Sentiment over time</h3>
      <div class="legend" id="lg-line"></div>
      <div id="c-line"></div>
    </div>
    <div class="card"><h3>Sentiment split</h3><div id="c-donut"></div></div>
    <div class="card"><h3>Sentiment by platform</h3><div class="legend" id="lg-plat"></div><div id="c-platform"></div></div>
    <div class="card"><h3>Intent breakdown</h3><div id="c-intent"></div></div>
    <div class="card"><h3>Share of voice — brand mentions</h3><div class="legend" id="lg-sov"></div><div id="c-sov"></div></div>
    <div class="card"><h3>Themes (colored by sentiment)</h3><div id="c-themes"></div></div>
    <div class="card"><h3>Mentions by market</h3><div id="c-markets"></div></div>
    <div class="card"><h3>Detected languages</h3><div id="c-langs"></div></div>
    <div class="card wide">
      <h3>Comments <span style="font-weight:400;color:var(--muted)">(first 300 of filtered)</span></h3>
      <input id="f-search" placeholder="Search text or translation…" style="width:260px;margin-bottom:8px;
             background:var(--surface-1);color:var(--ink);border:1px solid var(--ring);border-radius:8px;padding:6px 10px;font-size:12.5px;">
      <div class="tblwrap"><table class="tbl" id="c-table"></table></div>
    </div>
  </div>
</div>
<div id="tip"></div>

<script>
window.DATA = /*__DATA__*/[];
window.META = /*__META__*/{};

(function () {
  "use strict";
  const DATA = window.DATA, META = window.META;
  const $ = (s) => document.querySelector(s);
  const fmt = (n) => Number(n).toLocaleString();
  const SENT = ["positive", "neutral", "negative"];
  const SENT_VAR = { positive: "var(--pos)", neutral: "var(--neu)", negative: "var(--neg)" };
  const tip = $("#tip");

  $("#snapshot-badge").textContent = (META.sample ? "SAMPLE DATA · " : "") + "snapshot " + (META.generated || "");
  $("#subtitle").textContent = fmt(DATA.length) + " classified comments · generated by the dabur-listen pipeline (python -m dabur_listen snapshot)";

  function showTip(html, x, y) {
    tip.innerHTML = html; tip.style.display = "block";
    const r = tip.getBoundingClientRect();
    tip.style.left = Math.min(x + 12, window.innerWidth - r.width - 8) + "px";
    tip.style.top = Math.min(y + 12, window.innerHeight - r.height - 8) + "px";
  }
  function hideTip() { tip.style.display = "none"; }

  function countBy(rows, key) {
    const m = new Map();
    for (const r of rows) { const k = r[key] || "unknown"; m.set(k, (m.get(k) || 0) + 1); }
    return m;
  }
  function legend(el, items) {
    el.innerHTML = items.map(([label, color]) =>
      `<span><i style="background:${color}"></i>${label}</span>`).join("");
  }

  // ── populate filter options ────────────────────────────────────────────────
  function fill(sel, values) {
    for (const v of [...new Set(values)].sort()) {
      if (!v) continue;
      const o = document.createElement("option"); o.value = v; o.textContent = v;
      sel.appendChild(o);
    }
  }
  fill($("#f-platform"), DATA.map((r) => r.platform));
  fill($("#f-market"), DATA.map((r) => r.market).filter((m) => m && m !== "unknown"));
  fill($("#f-tag"), DATA.map((r) => r.tag));

  function filtered() {
    const range = $("#f-range").value, plat = $("#f-platform").value,
      ent = $("#f-entity").value, mkt = $("#f-market").value,
      sent = $("#f-sentiment").value, tag = $("#f-tag").value;
    let minDay = null;
    if (range !== "all" && META.max_day) {
      const d = new Date(META.max_day); d.setDate(d.getDate() - parseInt(range, 10));
      minDay = d.toISOString().slice(0, 10);
    }
    return DATA.filter((r) =>
      (!minDay || r.day >= minDay) &&
      (!plat || r.platform === plat) &&
      (!ent || r.entity === ent || (ent === "own" && r.entity === "both") || (ent === "competitor" && r.entity === "both")) &&
      (!mkt || r.market === mkt) &&
      (!sent || r.sentiment === sent) &&
      (!tag || r.tag === tag));
  }

  // ── KPI row ────────────────────────────────────────────────────────────────
  function renderKpis(rows) {
    const n = rows.length || 1;
    const pos = rows.filter((r) => r.sentiment === "positive").length;
    const neg = rows.filter((r) => r.sentiment === "negative").length;
    const buy = rows.filter((r) => r.intent === "purchase_intent").length;
    const net = Math.round((100 * (pos - neg)) / n);
    $("#kpis").innerHTML = `
      <div class="kpi"><div class="lbl">Mentions analyzed</div><div class="val">${fmt(rows.length)}</div></div>
      <div class="kpi"><div class="lbl">Positive</div><div class="val pos">${Math.round((100 * pos) / n)}%</div></div>
      <div class="kpi"><div class="lbl">Negative</div><div class="val neg">${Math.round((100 * neg) / n)}%</div></div>
      <div class="kpi"><div class="lbl">Net sentiment</div><div class="val">${net > 0 ? "+" : ""}${net} pts</div></div>
      <div class="kpi"><div class="lbl">Purchase-intent signals</div><div class="val">${fmt(buy)}</div></div>`;
  }

  // ── horizontal stacked bars (div-based) ────────────────────────────────────
  // rows: [{label, segs: [{key, val, color}]}]
  function hStacked(container, rows, tipFor) {
    const el = $(container); el.innerHTML = "";
    if (!rows.length) { el.innerHTML = '<div class="empty">No data in this filter</div>'; return; }
    const max = Math.max(...rows.map((r) => r.segs.reduce((a, s) => a + s.val, 0)));
    for (const row of rows) {
      const total = row.segs.reduce((a, s) => a + s.val, 0);
      const d = document.createElement("div"); d.className = "hrow";
      const track = row.segs.filter((s) => s.val > 0).map((s) =>
        `<div class="seg" style="background:${s.color};flex:0 0 ${(100 * s.val) / max}%"
              data-tip="${(tipFor || ((r, sg) => `${r.label} · ${sg.key}: <b>${fmt(sg.val)}</b>`))(row, s).replace(/"/g, "&quot;")}"></div>`).join("");
      d.innerHTML = `<div class="rl" title="${row.label}">${row.label}</div>
                     <div class="track">${track}</div><div class="rv">${fmt(total)}</div>`;
      el.appendChild(d);
    }
    el.querySelectorAll(".seg").forEach((s) => {
      s.addEventListener("mousemove", (e) => showTip(s.dataset.tip, e.clientX, e.clientY));
      s.addEventListener("mouseleave", hideTip);
    });
  }

  function sentimentSegs(map) {
    return SENT.map((s) => ({ key: s, val: map.get(s) || 0, color: SENT_VAR[s] }));
  }

  // ── line chart (SVG) ───────────────────────────────────────────────────────
  function lineChart(container, days, series) {
    const el = $(container); el.innerHTML = "";
    if (!days.length) { el.innerHTML = '<div class="empty">No data in this filter</div>'; return; }
    const W = Math.max(el.clientWidth || 600, 320), H = 240;
    const m = { l: 34, r: 10, t: 8, b: 22 };
    const iw = W - m.l - m.r, ih = H - m.t - m.b;
    const maxY = Math.max(1, ...series.flatMap((s) => s.values));
    const x = (i) => m.l + (days.length === 1 ? iw / 2 : (i * iw) / (days.length - 1));
    const y = (v) => m.t + ih - (v / maxY) * ih;
    let g = "";
    const ticks = 4;
    for (let t = 0; t <= ticks; t++) {
      const v = (maxY * t) / ticks, yy = y(v);
      g += `<line x1="${m.l}" y1="${yy}" x2="${W - m.r}" y2="${yy}" stroke="var(--grid)" stroke-width="1"/>
            <text x="${m.l - 6}" y="${yy + 3}" text-anchor="end">${Math.round(v)}</text>`;
    }
    const step = Math.max(1, Math.ceil(days.length / 6));
    for (let i = 0; i < days.length; i += step) {
      g += `<text x="${x(i)}" y="${H - 6}" text-anchor="middle">${days[i].slice(5)}</text>`;
    }
    for (const s of series) {
      const pts = s.values.map((v, i) => `${x(i)},${y(v)}`).join(" ");
      g += `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2" stroke-linejoin="round"/>`;
    }
    g += `<line id="xh" x1="0" y1="${m.t}" x2="0" y2="${m.t + ih}" stroke="var(--baseline)" stroke-width="1" visibility="hidden"/>`;
    el.innerHTML = `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block">${g}
      <rect x="${m.l}" y="${m.t}" width="${iw}" height="${ih}" fill="transparent" id="ov"/></svg>`;
    const svg = el.querySelector("svg"), ov = el.querySelector("#ov"), xh = el.querySelector("#xh");
    ov.addEventListener("mousemove", (e) => {
      const r = svg.getBoundingClientRect();
      const px = ((e.clientX - r.left) / r.width) * W;
      const i = Math.max(0, Math.min(days.length - 1,
        Math.round(((px - m.l) / iw) * (days.length - 1))));
      xh.setAttribute("x1", x(i)); xh.setAttribute("x2", x(i)); xh.setAttribute("visibility", "visible");
      showTip(`<b>${days[i]}</b><br>` + series.map((s) =>
        `<span style="color:${s.color}">●</span> ${s.name}: <b>${s.values[i]}</b>`).join("<br>"),
        e.clientX, e.clientY);
    });
    ov.addEventListener("mouseleave", () => { xh.setAttribute("visibility", "hidden"); hideTip(); });
  }

  // ── donut (SVG) ────────────────────────────────────────────────────────────
  function donut(container, items) {
    const el = $(container); el.innerHTML = "";
    const total = items.reduce((a, i) => a + i.value, 0);
    if (!total) { el.innerHTML = '<div class="empty">No data in this filter</div>'; return; }
    const R = 74, C = 100, SW = 26, circ = 2 * Math.PI * R;
    let off = 0, segs = "";
    for (const it of items) {
      if (!it.value) continue;
      const frac = it.value / total;
      const len = Math.max(0, frac * circ - 2);
      segs += `<circle r="${R}" cx="${C}" cy="${C}" fill="none" stroke="${it.color}"
        stroke-width="${SW}" stroke-dasharray="${len} ${circ - len}"
        stroke-dashoffset="${-off * circ}" transform="rotate(-90 ${C} ${C})"
        data-tip="${it.label}: <b>${fmt(it.value)}</b> (${Math.round(100 * frac)}%)"></circle>`;
      off += frac;
    }
    el.innerHTML = `<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
      <svg width="160" height="160" viewBox="0 0 200 200">${segs}
        <text x="${C}" y="${C - 2}" text-anchor="middle" style="font-size:24px;font-weight:650;fill:var(--ink)">${fmt(total)}</text>
        <text x="${C}" y="${C + 16}" text-anchor="middle">mentions</text></svg>
      <div class="legend" style="flex-direction:column;align-items:flex-start;gap:6px">
        ${items.map((i) => `<span><i style="background:${i.color}"></i>${i.label}
          <b style="color:var(--ink)">${fmt(i.value)}</b></span>`).join("")}</div></div>`;
    el.querySelectorAll("circle[data-tip]").forEach((c) => {
      c.addEventListener("mousemove", (e) => showTip(c.dataset.tip, e.clientX, e.clientY));
      c.addEventListener("mouseleave", hideTip);
    });
  }

  // ── table ──────────────────────────────────────────────────────────────────
  function esc(s) { return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;"); }
  function renderTable(rows) {
    const q = ($("#f-search").value || "").toLowerCase();
    const sub = rows.filter((r) => !q || (r.text || "").toLowerCase().includes(q) ||
      (r.translation || "").toLowerCase().includes(q)).slice(0, 300);
    $("#c-table").innerHTML =
      `<tr><th>Platform</th><th>Author</th><th>Original</th><th>English</th><th>Language</th>
       <th>Sentiment</th><th>Intent</th><th>Market</th><th>Likes</th></tr>` +
      sub.map((r) => `<tr>
        <td>${esc(r.platform)}</td><td>${esc(r.author)}</td>
        <td class="orig">${esc(r.text)}</td><td class="trans">${esc(r.translation)}</td>
        <td>${esc(r.language)}</td>
        <td><span class="chip" style="background:${SENT_VAR[r.sentiment] || "var(--neu)"}">${esc(r.sentiment)}</span></td>
        <td>${esc(r.intent)}</td><td>${esc(r.market)}</td><td>${fmt(r.likes || 0)}</td></tr>`).join("");
  }

  // ── render everything ──────────────────────────────────────────────────────
  function renderAll() {
    const rows = filtered();
    renderKpis(rows);

    // sentiment over time
    const days = [...new Set(rows.map((r) => r.day))].sort();
    const byDay = {};
    for (const s of SENT) byDay[s] = days.map(() => 0);
    const idx = new Map(days.map((d, i) => [d, i]));
    for (const r of rows) if (byDay[r.sentiment]) byDay[r.sentiment][idx.get(r.day)]++;
    const lineSeries = SENT.map((s) => ({ name: s, color: SENT_VAR[s], values: byDay[s] }));
    legend($("#lg-line"), SENT.map((s) => [s, SENT_VAR[s]]));
    lineChart("#c-line", days, lineSeries);

    // donut
    const sc = countBy(rows, "sentiment");
    donut("#c-donut", SENT.map((s) => ({ label: s, value: sc.get(s) || 0, color: SENT_VAR[s] })));

    // platform × sentiment
    legend($("#lg-plat"), SENT.map((s) => [s, SENT_VAR[s]]));
    const plats = [...countBy(rows, "platform").entries()].sort((a, b) => b[1] - a[1]);
    hStacked("#c-platform", plats.map(([p]) => {
      const m = countBy(rows.filter((r) => r.platform === p), "sentiment");
      return { label: p, segs: sentimentSegs(m) };
    }));

    // intent
    const ic = [...countBy(rows, "intent").entries()].sort((a, b) => b[1] - a[1]);
    hStacked("#c-intent", ic.map(([k, v]) => ({ label: k, segs: [{ key: "count", val: v, color: "var(--s1)" }] })),
      (r, s) => `${r.label}: <b>${fmt(s.val)}</b>`);

    // share of voice
    legend($("#lg-sov"), [["own brand", "var(--s1)"], ["competitor", "var(--s8)"]]);
    const bm = new Map();
    for (const r of rows) for (const b of r.brands || []) {
      const e = bm.get(b) || { n: 0, own: 0 };
      e.n++; if (r.entity === "own" || r.entity === "both") e.own++;
      bm.set(b, e);
    }
    const sov = [...bm.entries()].sort((a, b) => b[1].n - a[1].n).slice(0, 12);
    hStacked("#c-sov", sov.map(([b, e]) => ({
      label: b,
      segs: [{ key: "mentions", val: e.n, color: (META.own_brands || []).includes(b) ? "var(--s1)" : "var(--s8)" }],
    })), (r, s) => `${r.label}: <b>${fmt(s.val)}</b> mentions`);

    // themes × sentiment
    const tm = new Map();
    for (const r of rows) for (const t of r.themes || []) {
      const e = tm.get(t) || new Map();
      e.set(r.sentiment, (e.get(r.sentiment) || 0) + 1);
      tm.set(t, e);
    }
    const themes = [...tm.entries()]
      .sort((a, b) => [...b[1].values()].reduce((x, y) => x + y, 0) - [...a[1].values()].reduce((x, y) => x + y, 0))
      .slice(0, 12);
    hStacked("#c-themes", themes.map(([t, m]) => ({ label: t, segs: sentimentSegs(m) })));

    // markets × sentiment
    const mkRows = rows.filter((r) => r.market && r.market !== "unknown");
    const mks = [...countBy(mkRows, "market").entries()].sort((a, b) => b[1] - a[1]);
    hStacked("#c-markets", mks.map(([mk]) => {
      const m = countBy(mkRows.filter((r) => r.market === mk), "sentiment");
      return { label: mk, segs: sentimentSegs(m) };
    }));

    // languages
    const lc = [...countBy(rows, "language").entries()].sort((a, b) => b[1] - a[1]).slice(0, 12);
    hStacked("#c-langs", lc.map(([k, v]) => ({ label: k, segs: [{ key: "count", val: v, color: "var(--s5)" }] })),
      (r, s) => `${r.label}: <b>${fmt(s.val)}</b>`);

    renderTable(rows);
  }

  ["f-range", "f-platform", "f-entity", "f-market", "f-sentiment", "f-tag"]
    .forEach((id) => $("#" + id).addEventListener("change", renderAll));
  $("#f-search").addEventListener("input", () => renderTable(filtered()));
  window.addEventListener("resize", renderAll);
  renderAll();
})();
</script>
