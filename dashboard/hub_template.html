<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dabur · MENA Social Sentiment Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500;600&family=Noto+Naskh+Arabic:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EFEDE6;--card:#fff;--primary:#1E3A66;--primaryD:#16294A;--gold:#D6A22E;--goldBg:#FAF3DD;
  --green:#34A85A;--greenD:#2C7A47;--greenBg:#E6F2EA;--purple:#7E5BC2;--purpleBg:#ECE6F7;
  --red:#E0503A;--redBg:#FBE9E6;--ink:#232730;--muted:#6B7280;--line:#E7E4DB;
  --issue:#E0503A;--issueBg:#FBE9E6;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:'Inter',system-ui,Arial,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.serif{font-family:'DM Serif Display',Georgia,serif}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace}
h1,h2{margin:0}
/* HEADER */
.app-header{position:sticky;top:0;z-index:100;background:var(--primary);color:#fff;
  padding:14px 26px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  box-shadow:0 2px 10px rgba(20,41,74,.18)}
.brand-badge{background:var(--gold);color:var(--primaryD);font-family:'DM Serif Display',serif;
  font-size:18px;letter-spacing:.5px;padding:7px 15px;border-radius:8px;font-weight:400}
.htitle{font-family:'DM Serif Display',serif;font-size:21px;line-height:1.1}
.hsub{font-size:12px;color:#cdd8ec;font-family:'JetBrains Mono',monospace;margin-top:3px}
.hspring{flex:1}
.live{display:flex;align-items:center;gap:7px;font-size:11px;letter-spacing:1px;
  color:#fff;background:rgba(255,255,255,.10);padding:6px 11px;border-radius:20px;border:1px solid rgba(214,162,46,.5)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 1.6s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(214,162,46,.6)}70%{box-shadow:0 0 0 7px rgba(214,162,46,0)}100%{box-shadow:0 0 0 0 rgba(214,162,46,0)}}
.switcher{display:flex;align-items:center;gap:8px}
select.brandSel{font-family:'Inter',sans-serif;font-size:13px;font-weight:600;color:var(--primaryD);
  background:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;max-width:240px}
.btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.4);
  background:rgba(255,255,255,.08);color:#fff;border-radius:8px;padding:8px 12px}
.btn:hover{background:rgba(255,255,255,.18)}
/* NAV */
.tabs{position:sticky;top:62px;z-index:99;background:var(--bg);border-bottom:1px solid var(--line);
  padding:0 18px;display:flex;gap:4px;overflow-x:auto;flex-wrap:wrap}
.tab{font-size:13px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;
  padding:14px 14px 12px;border-bottom:3px solid transparent;white-space:nowrap}
.tab:hover{color:var(--primary)}
.tab.active{color:var(--primary);border-bottom-color:var(--gold)}
/* SECTIONS */
main{max-width:1180px;margin:0 auto;padding:26px 24px 70px}
.section{display:none;animation:fade .25s ease}
.section.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.eyebrow{font-size:11px;letter-spacing:2px;font-weight:700;color:var(--primary);opacity:.7;text-transform:uppercase}
.h1{font-family:'DM Serif Display',serif;font-size:32px;color:var(--primary);margin:4px 0 20px}
/* CARDS */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;
  box-shadow:0 1px 3px rgba(0,0,0,.05),0 8px 22px rgba(30,58,102,.05);margin-bottom:18px}
.card-h{font-size:11px;letter-spacing:1.5px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 14px;text-align:center;
  box-shadow:0 1px 3px rgba(0,0,0,.05),0 8px 22px rgba(30,58,102,.05)}
.kpi .lab{font-size:10px;letter-spacing:1px;font-weight:700;color:var(--muted);text-transform:uppercase}
.kpi .num{font-family:'DM Serif Display',serif;font-size:40px;line-height:1.1;margin:6px 0 2px}
.kpi .sub{font-size:12px;color:var(--muted)}
.kpi .delta{font-size:11px;font-weight:600;margin-top:6px}
.t-green{color:var(--green)} .t-greenD{color:var(--greenD)} .t-purple{color:var(--purple)}
.t-red{color:var(--red)} .t-gold{color:#B98A1E} .t-navy{color:var(--primary)} .t-muted{color:var(--muted)}
.up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--muted)}
.kpi.tone-green{background:var(--greenBg)} .kpi.tone-purple{background:var(--purpleBg)}
.kpi.tone-red{background:var(--redBg)} .kpi.tone-gold{background:var(--goldBg)}
/* layout helpers */
.two{display:grid;grid-template-columns:300px 1fr;gap:18px;align-items:start}
.three{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.four{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
@media(max-width:880px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.two,.row2{grid-template-columns:1fr}.three,.four{grid-template-columns:1fr 1fr}}
/* sentiment bar + donut */
.sentbar{display:flex;height:46px;border-radius:10px;overflow:hidden;font-size:13px;font-weight:700;color:#fff}
.sentbar span{display:flex;align-items:center;padding:0 14px}
.sb-pos{background:var(--green)} .sb-neu{background:var(--purple)} .sb-neg{background:var(--red)}
.legend{display:flex;gap:26px;margin-top:12px;font-size:13px;color:var(--muted);flex-wrap:wrap}
.legend i{width:11px;height:11px;border-radius:50%;display:inline-block;margin-right:7px;vertical-align:middle}
.net-card{background:var(--greenBg);border:1.5px solid var(--green);border-radius:14px;padding:22px;text-align:center}
.net-card .num{font-family:'DM Serif Display',serif;font-size:54px;color:var(--greenD);line-height:1}
.donut-wrap{display:flex;align-items:center;gap:22px}
/* alert */
.alert{background:var(--redBg);border:1.5px solid var(--red);border-radius:12px;padding:14px 18px;
  display:flex;gap:12px;align-items:flex-start;font-size:13.5px;color:#7a2218;margin-top:6px}
.alert .ai{font-size:20px}
/* comments */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.chip{font-size:12.5px;font-weight:600;color:var(--muted);background:var(--card);border:1px solid var(--line);
  border-radius:20px;padding:7px 14px;cursor:pointer}
.chip:hover{border-color:var(--primary);color:var(--primary)}
.chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.cmt{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;
  box-shadow:0 1px 2px rgba(0,0,0,.04)}
.cmt-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.handle{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--primary);font-weight:600}
.cmt-likes{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);margin-left:auto}
.spill{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:6px;letter-spacing:.3px}
.s-pos{background:var(--greenBg);color:var(--greenD)} .s-neu{background:var(--purpleBg);color:var(--purple)}
.s-neg{background:var(--redBg);color:var(--red)}
.ctext-orig{font-size:14px;font-weight:500;color:var(--ink)}
.ctext-orig[dir=rtl]{text-align:right;font-family:'Noto Naskh Arabic','Inter',serif;font-size:15px;direction:rtl}
.ctext-en{font-style:italic;font-size:13px;color:var(--muted);border-left:3px solid var(--line);padding:4px 10px;margin-top:6px}
.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.badge{font-size:10px;font-weight:700;letter-spacing:.4px;padding:3px 8px;border-radius:6px}
.b-new{background:var(--goldBg);color:#9a6f12} .b-issue{background:var(--issueBg);color:var(--issue)}
.b-brand{background:var(--primary);color:#fff} .b-lang{background:#eef1f6;color:var(--primary)}
.vid-tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.empty{text-align:center;color:var(--muted);padding:40px;font-size:14px}
.loadmore{display:block;margin:6px auto 0;font-size:13px;font-weight:600;color:var(--primary);
  background:var(--card);border:1px solid var(--line);border-radius:10px;padding:11px 22px;cursor:pointer}
/* themes */
.bar-row{display:grid;grid-template-columns:200px 1fr 44px;align-items:center;gap:12px;margin-bottom:11px}
.bar-label{font-size:13px;font-weight:600;text-align:right;color:var(--ink)}
.bar-track{background:#eee9df;border-radius:7px;height:24px;overflow:hidden}
.bar-fill{height:100%;border-radius:7px}
.bf-pos{background:var(--green)} .bf-gold{background:var(--gold)} .bf-risk{background:var(--red)}
.bf-navy{background:var(--primary)} .bf-purple{background:var(--purple)}
.bar-val{font-family:'DM Serif Display',serif;font-size:18px;color:var(--ink)}
.intent-row{margin-bottom:13px}
.intent-row .il{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.intent-track{background:#eee9df;border-radius:6px;height:12px;overflow:hidden}
.intent-fill{height:100%}
.tl-item{display:grid;grid-template-columns:80px 1fr;gap:14px;padding:10px 0;border-bottom:1px solid var(--line)}
.tl-item:last-child{border-bottom:none}
.tl-d{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;
  padding:8px 10px;border-bottom:2px solid var(--line)}
td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top}
.pri{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap}
.pri.CRITICAL{background:var(--redBg);color:var(--red)} .pri.HIGH{background:var(--goldBg);color:#9a6f12}
.pri.MEDIUM{background:#eef1f6;color:var(--primary)} .pri.AMPLIFY{background:var(--greenBg);color:var(--greenD)}
.pri.OPPORTUNITY{background:var(--purpleBg);color:var(--purple)}
.st{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
/* advocates / channels / variants */
.adv{display:flex;gap:12px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--line)}
.adv:last-child{border-bottom:none}
.adv .ic{font-size:20px}
.adv .au{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--primary);font-weight:600}
.adv .at{font-size:11px;color:var(--gold);font-weight:700} .adv .aq{font-size:13px;color:var(--ink);font-style:italic}
.chan{border-radius:12px;padding:14px 16px;border:1px solid var(--line)}
.chan.ok{background:var(--greenBg);border-color:var(--green)} .chan.bad{background:var(--redBg);border-color:var(--red)}
.chan.warn{background:var(--goldBg);border-color:var(--gold)}
.chan .cn{font-weight:700;font-size:14px} .chan .cnote{font-size:12.5px;color:var(--muted);margin-top:3px}
.chan .cs{font-size:18px}
.var-row{display:grid;grid-template-columns:40px 1fr auto;gap:12px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line)}
.var-row:last-child{border-bottom:none}
.var-rank{font-size:22px;text-align:center}
.var-name{font-weight:700;font-size:14px} .var-note{font-size:12px;color:var(--muted)}
.var-tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px}
/* risks */
.risk{border-left:none;border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:13px;background:var(--card)}
.risk-h{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.risk-t{font-weight:700;font-size:15px}
.risk-d{font-size:13px;color:#444;margin:4px 0 10px}
.risk-q{background:var(--bg);border-radius:8px;padding:9px 12px;font-size:13px;font-style:italic}
.risk-by{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:4px}
.risk-sla{font-size:12px;font-weight:700;color:var(--red);margin-top:8px}
.sevpills{display:flex;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.sevpill{border-radius:10px;padding:10px 18px;font-weight:700;font-size:14px}
.sla-guide{font-size:12.5px;color:var(--muted)}
/* videos */
.vcard{background:var(--card);border:1px solid var(--line);border-top:4px solid var(--primary);border-radius:12px;
  padding:18px;box-shadow:0 6px 18px rgba(30,58,102,.05)}
.vcard h3{font-size:15px;margin:0 0 2px} .vid-id{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}
.vstat{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:1px solid var(--line)}
.vstat b{font-weight:600} .vstat:last-of-type{border-bottom:none}
.vinsight{font-size:13px;border-radius:8px;padding:10px 12px;margin-top:12px}
/* reco */
.reco-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;
  box-shadow:0 6px 18px rgba(30,58,102,.05);display:flex;gap:14px}
.reco-num{font-family:'DM Serif Display',serif;font-size:24px;color:#fff;background:var(--primary);
  width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:0 0 42px}
.reco-t{font-weight:700;font-size:15px;margin-bottom:5px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.when{font-size:10px;font-weight:800;letter-spacing:.5px;padding:3px 9px;border-radius:6px}
.when.red{background:var(--redBg);color:var(--red)} .when.gold{background:var(--goldBg);color:#9a6f12}
.when.navy{background:#eef1f6;color:var(--primary)}
.reco-d{font-size:13px;color:#444}
.takeaway{background:var(--primary);color:#fff;border-radius:16px;padding:26px 30px}
.takeaway .tk{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:10px;color:var(--gold)}
.takeaway p{font-size:15px;line-height:1.65;color:#e8eef8;margin:0}
.foot{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-align:center;margin-top:24px}
/* modal */
.modal{position:fixed;inset:0;background:rgba(20,30,50,.55);display:none;align-items:center;justify-content:center;z-index:200}
.modal.open{display:flex}
.modal-box{background:#fff;border-radius:14px;padding:24px;width:min(640px,92vw);max-height:86vh;overflow:auto}
.modal-box h3{font-family:'DM Serif Display',serif;color:var(--primary);font-size:22px}
textarea{width:100%;min-height:200px;font-family:'JetBrains Mono',monospace;font-size:12px;border:1px solid var(--line);
  border-radius:10px;padding:12px;resize:vertical}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
.btn-primary{background:var(--primary);color:#fff;border:none;border-radius:9px;padding:10px 18px;font-weight:600;cursor:pointer}
.btn-ghost{background:#fff;color:var(--primary);border:1px solid var(--line);border-radius:9px;padding:10px 18px;font-weight:600;cursor:pointer}
.hint{font-size:12px;color:var(--muted);margin:6px 0 12px}
</style></head><body>
<header class="app-header">
  <div class="brand-badge" id="badge">DABUR</div>
  <div><div class="htitle" id="htitle">TikTok Social Sentiment</div><div class="hsub" id="hmeta"></div></div>
  <div class="hspring"></div>
  <div class="live"><span class="live-dot"></span>LIVE HUB</div>
  <div class="switcher">
    <select class="brandSel" id="brandSel"></select>
    <button class="btn" onclick="openImport()">+ Add brand</button>
    <button class="btn" onclick="exportAll()">Export</button>
  </div>
</header>
<nav class="tabs"><button class="tab" id="tab-overview-btn" onclick="showTab('tab-overview',this)">Overview</button><button class="tab" id="tab-comments-btn" onclick="showTab('tab-comments',this)">All Comments</button><button class="tab" id="tab-themes-btn" onclick="showTab('tab-themes',this)">Themes & Topics</button><button class="tab" id="tab-monitor-btn" onclick="showTab('tab-monitor',this)">Brand Monitor</button><button class="tab" id="tab-issue-btn" onclick="showTab('tab-issue',this)">Issue</button><button class="tab" id="tab-risk-btn" onclick="showTab('tab-risk',this)">Risk Flags</button><button class="tab" id="tab-videos-btn" onclick="showTab('tab-videos',this)">Video Comparison</button><button class="tab" id="tab-reco-btn" onclick="showTab('tab-reco',this)">Recommendations</button><button class="tab" id="tab-trend-btn" onclick="showTab('tab-trend',this)">Trend Radar</button></nav>
<main><section class="section" id="tab-overview"></section><section class="section" id="tab-comments"></section><section class="section" id="tab-themes"></section><section class="section" id="tab-monitor"></section><section class="section" id="tab-issue"></section><section class="section" id="tab-risk"></section><section class="section" id="tab-videos"></section><section class="section" id="tab-reco"></section><section class="section" id="tab-trend"></section></main>
<div class="modal" id="importModal"><div class="modal-box">
  <h3>Add / Import brand</h3>
  <p class="hint">Paste a single brand payload (object with an <code>id</code>) or a full hub export (object with <code>brands</code>). Imported brands are saved in this browser via localStorage. Use <b>Export</b> first to grab a template.</p>
  <input type="file" accept="application/json" onchange="fileImport(event)" style="margin-bottom:10px">
  <textarea id="importText" placeholder='{ "id":"brand_market", "meta":{...}, "palette":{...}, "comments":[...], ... }'></textarea>
  <div class="modal-actions">
    <button class="btn-ghost" onclick="resetHub()">Reset hub</button>
    <button class="btn-ghost" onclick="closeImport()">Cancel</button>
    <button class="btn-primary" onclick="doImport()">Import</button>
  </div>
</div></div>

/* ---------- OVERVIEW ---------- */
function donut(s){
  const C=2*Math.PI*70, segs=[['pos',s.pos,'var(--green)'],['neu',s.neu,'var(--purple)'],['neg',s.neg,'var(--red)']];
  let off=0,arcs='';
  segs.forEach(([k,v,col])=>{const len=C*v/100;
    arcs+=`<circle r="70" cx="90" cy="90" fill="none" stroke="${col}" stroke-width="26"
      stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 90 90)"></circle>`;
    off+=len;});
  return `<svg width="180" height="180" viewBox="0 0 180 180">${arcs}
    <text x="90" y="84" text-anchor="middle" class="serif" font-size="34" fill="var(--primary)">${s.pos}%</text>
    <text x="90" y="104" text-anchor="middle" font-size="11" fill="var(--muted)">positive</text></svg>`;
}

     <div class="sub">${esc(x.sub)}</div>
     <div class="delta ${x.dtone}">${esc(x.delta)}</div></div>`).join('');
  const s=b.sent;
  const _src=b.noLikes?b.comments.filter(c=>c.feat):[...b.comments].sort((a,c)=>c.lk-a.lk);
  const top5=_src.slice(0,b.noLikes?6:5).map(c=>{
    const t=c.lang&&c.lang!=='en'&&c.en?c.en:c.orig;
    const ic=b.noLikes?('📷 '+esc(c.vid)):('❤️ '+c.lk);
    return `<div class="adv"><div class="ic" style="font-size:13px;color:var(--muted)">${ic}</div><div>
       <div class="au">@${esc(c.u)}</div><div class="aq">"${esc(t)}"</div>
       <div class="vid-tag">${esc(c.vid)} · ${({pos:'positive',neu:'neutral',neg:'negative'})[c.s]}</div></div></div>`;}).join('');
  const _topTitle=b.noLikes?'Featured Comments':'Top 5 Comments by Likes';
  document.getElementById('tab-overview').innerHTML=`
   <div class="eyebrow">Overview</div><h1 class="h1">Sentiment Snapshot</h1>
   <div class="kpi-grid">${k}</div>
   <div class="two">
     <div class="card"><div class="card-h">Sentiment Split</div>
       <div class="donut-wrap">${donut(s)}</div>
       <div class="net-card" style="margin-top:16px"><div class="lab" style="font-size:10px;letter-spacing:1px;color:var(--muted);font-weight:700">NET SENTIMENT</div>
         <div class="num">${esc(b.kpis[5].val)}</div><div class="sub" style="font-size:12px;color:var(--greenD)">${esc(b.kpis[5].sub)}</div></div>
     </div>
     <div class="card"><div class="card-h">Sentiment Distribution</div>
       <div class="sentbar">
         <span class="sb-pos" style="width:${s.pos}%">${s.pos}% Positive</span>
         <span class="sb-neu" style="width:${s.neu}%">${s.neu}%</span>
         <span class="sb-neg" style="width:${s.neg}%">${s.neg}%</span></div>
       <div class="legend">
         <span><i style="background:var(--green)"></i>Positive — ${esc(s.posN)}</span>
         <span><i style="background:var(--purple)"></i>Neutral — ${esc(s.neuN)}</span>

     </div>
   </div>

/* ---------- COMMENTS ---------- */
function commentCard(c,b){
  const flag=langFlag(c.lang);
  let body;
  if(c.lang&&c.lang!=='en'&&c.en){
    const dir=c.rtl?' dir="rtl"':'';
    body=`<div class="ctext-orig"${dir}>${flag} ${esc(c.orig)}</div><div class="ctext-en">🇬🇧 ${esc(c.en)}</div>`;
  }else{body=`<div class="ctext-orig">${esc(c.orig)}</div>`;}
  let badges='';
  if(c.new)badges+='<span class="badge b-new">🆕 NEW</span>';
  if(c[b.issue.flag])badges+=`<span class="badge b-issue">${esc(b.issue.filter.toUpperCase())}</span>`;
  if(c.brand)badges+='<span class="badge b-brand">BRAND REPLY</span>';
  if(c.lang&&c.lang!=='en')badges+=`<span class="badge b-lang">${flag} ${esc(c.lang.toUpperCase())}</span>`;
  const sc={pos:'s-pos',neu:'s-neu',neg:'s-neg'}[c.s];
  const sl={pos:'POSITIVE',neu:'NEUTRAL',neg:'NEGATIVE'}[c.s];
  return `<div class="cmt"><div class="cmt-top">
     <span class="handle">@${esc(c.u)}</span><span class="spill ${sc}">${sl}</span>
     <span class="vid-tag">${esc(c.vid)}</span>${(b.noLikes||!c.lk)?'':`<span class="cmt-likes">❤️ ${c.lk}</span>`}</div>
     ${body}${badges?`<div class="badges">${badges}</div>`:''}</div>`;
}
function renderCommentsTab(b){
  const vids=[...new Set(b.comments.map(c=>c.vid))];
  const fixed=[['all','All'],['pos','Positive'],['neu','Neutral'],['neg','Negative'],
    ['issue',b.issue.filter],['brand','Brand Replies']];
  const vchips=vids.map(v=>['vid:'+v,v]);
  const chips=[...fixed,...vchips].map(([f,l])=>
    `<button class="chip${f==='all'?' active':''}" data-f="${esc(f)}" onclick="setFilter('${esc(f)}',this)">${esc(l)}</button>`).join('');
  document.getElementById('tab-comments').innerHTML=`
   <div class="eyebrow">All Comments</div><h1 class="h1">Filterable Comment Feed</h1>
   <div class="chips">${chips}</div>
   <div id="feed"></div>
   <div id="feedmore"></div>`;
  state.filter='all';state.page=0;renderComments('all');
}
function filterComments(b,f){
  if(f==='all')return b.comments;
  if(['pos','neu','neg'].includes(f))return b.comments.filter(c=>c.s===f);
  if(f==='issue')return b.comments.filter(c=>c[b.issue.flag]);
  if(f==='brand')return b.comments.filter(c=>c.brand);
  if(f.startsWith('vid:'))return b.comments.filter(c=>c.vid===f.slice(4));
  return b.comments;
}
function setFilter(f,el){state.filter=f;state.page=0;
  document.querySelectorAll('#tab-comments .chip').forEach(c=>c.classList.remove('active'));
  if(el)el.classList.add('active');renderComments(f);}
function renderComments(filter){
  const b=B();const list=filterComments(b,filter);
  const feed=document.getElementById('feed');const more=document.getElementById('feedmore');
  if(!list.length){feed.innerHTML=`<div class="empty">No comments match this filter.${filter==='brand'?' <b>0% brand response</b> — no brand replies detected in this dataset.':''}</div>`;more.innerHTML='';return;}
  const end=(state.page+1)*state.perPage;
  feed.innerHTML=list.slice(0,end).map(c=>commentCard(c,b)).join('');
  more.innerHTML=end<list.length?`<button class="loadmore" onclick="state.page++;renderComments(state.filter)">Load more (${list.length-end} remaining)</button>`:'';
}

/* ---------- RISK FLAGS ---------- */
function renderRisk(b){
  const order={CRITICAL:0,HIGH:1,MEDIUM:2,LOW:3};
  const rk=[...b.risks].sort((a,c)=>order[a.sev]-order[c.sev]);
  const cnt={};rk.forEach(r=>cnt[r.sev]=(cnt[r.sev]||0)+1);
  const pills=Object.entries(cnt).map(([s,n])=>{const cls={CRITICAL:'red',HIGH:'gold',MEDIUM:'navy'}[s]||'navy';
    const dot={CRITICAL:'🔴',HIGH:'🟠',MEDIUM:'🟡'}[s]||'⚪';
    return `<div class="sevpill when ${cls}">${dot} ${s} · ${n}</div>`;}).join('');
  const cards=rk.map(r=>{const dot={CRITICAL:'🔴',HIGH:'🟠',MEDIUM:'🟡'}[r.sev]||'⚪';
    return `<div class="risk"><div class="risk-h"><span class="pri ${r.sev}">${dot} ${r.sev}</span>
      <span class="risk-t">${esc(r.title)}</span></div>
      <div class="risk-d">${esc(r.desc)}</div>
      <div class="risk-q">"${esc(r.q)}"<div class="risk-by">${esc(r.by)}</div></div>
      <div class="risk-sla">SLA · ${esc(r.sla)}</div></div>`;}).join('');
  document.getElementById('tab-risk').innerHTML=`
   <div class="eyebrow">Risk Flags</div><h1 class="h1">Brand Risk Register — by Severity</h1>
   <div class="sevpills">${pills}</div>
   <p class="sla-guide">RESPONSE SLA &nbsp; 🔴 Critical → Now (overdue) &nbsp; 🟠 High → 24 hrs &nbsp; 🟡 Medium → 72 hrs</p>
   <div style="margin-top:14px">${cards}</div>`;
}

function renderTrend(){var T=TREND;var vtone=({GO:'green',WATCH:'gold',PASS:'red'})[T.verdict]||'navy';
var snap=T.snapshot.map(function(x){return '<div class="kpi tone-'+x.tone+'"><div class="lab">'+esc(x.label)+'</div><div class="num t-'+x.tone+'" style="font-size:26px">'+esc(x.val)+'</div><div class="sub">'+esc(x.sub)+'</div></div>';}).join('');
var ev=T.evidence.map(function(e){return '<tr><td style="white-space:nowrap"><b>'+esc(e.src)+'</b></td><td>'+esc(e.h)+'<div class="st">'+esc(e.note)+'</div></td><td class="st" style="white-space:nowrap">'+esc(e.metric)+'</td></tr>';}).join('');
var sc=T.score.map(function(x){var bf=x.tone==='green'?'pos':x.tone==='gold'?'gold':x.tone==='red'?'risk':'navy';return '<div class="bar-row" style="grid-template-columns:190px 1fr 40px"><div class="bar-label">'+esc(x.label)+'</div><div class="bar-track"><div class="bar-fill bf-'+bf+'" style="width:'+(x.v*10)+'%"></div></div><div class="bar-val">'+x.v+'</div><div style="grid-column:1/4;font-size:11.5px;color:var(--muted);margin:-4px 0 6px 200px">'+esc(x.note)+'</div></div>';}).join('');
var rk=T.risks.map(function(r){return '<div class="risk"><div class="risk-h"><span class="risk-t">'+esc(r.t)+'</span></div><div class="risk-d">'+esc(r.d)+'</div></div>';}).join('');
var act=T.actions.map(function(a){var w=a.w==='NOW'?'red':(a.w.indexOf('QUARTER')>-1||a.w==='SEASONAL')?'gold':'navy';return '<div class="reco-card"><div class="reco-num">'+a.n+'</div><div><div class="reco-t">'+esc(a.t)+' <span class="when '+w+'">'+esc(a.w)+'</span></div><div class="reco-d">'+esc(a.d)+'</div></div></div>';}).join('');
document.getElementById('tab-trend').innerHTML='<div class="eyebrow">Trend Radar</div><h1 class="h1">'+esc(T.name)+' — should Dabur Amla hop on?</h1>'+
 '<div class="card" style="border:2px solid var(--'+vtone+');background:var(--'+vtone+'Bg,var(--goldBg));display:flex;gap:18px;align-items:center"><div class="serif" style="font-size:44px;color:var(--'+vtone+')">'+esc(T.verdict)+'</div><div><div style="font-weight:700;font-size:16px">'+esc(T.vsub)+'</div><div style="font-size:13px;color:var(--muted)">Evaluation for '+esc(T['for'])+'</div></div></div>'+
 '<div class="kpi-grid">'+snap+'</div>'+
 '<div class="card"><div class="card-h">What the trend is</div><p style="font-size:14px;line-height:1.65;color:#333;margin:0">'+esc(T.what)+'</p></div>'+
 '<div class="row2"><div class="card"><div class="card-h">Signal — the posts &amp; similar trend content</div><table><tbody>'+ev+'</tbody></table></div><div class="card"><div class="card-h">Fit / Risk / Timing score (0-10)</div>'+sc+'</div></div>'+
 '<div class="card"><div class="card-h">Risks to manage</div>'+rk+'</div>'+
 '<div class="takeaway"><div class="tk">Recommendation</div><p>'+esc(T.reco)+'</p></div>'+
 '<div class="card" style="margin-top:18px"><div class="card-h">Action plan — if we hop on</div><div class="row2">'+act+'</div></div>'+
 '<div class="foot" style="text-align:left">'+esc(T.sources)+'</div>';}
function renderAll(){const b=B();applyPalette(b.palette);renderHeader(b);
  renderOverview(b);renderCommentsTab(b);renderThemes(b);renderMonitor(b);
  renderIssue(b);renderRisk(b);renderVideos(b);renderReco(b);renderTrend();}
function setBrand(id){state.active=id;buildSwitcher();renderAll();
  document.getElementById('tab-issue-btn').textContent=B().issue.tab;}
function showTab(id,el){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(el)el.classList.add('active');window.scrollTo({top:0,behavior:'smooth'});}

/* ---------- IMPORT / EXPORT ---------- */
function openImport(){document.getElementById('importModal').classList.add('open');}
function closeImport(){document.getElementById('importModal').classList.remove('open');}
function doImport(){
  const t=document.getElementById('importText').value.trim();if(!t)return;
  try{let obj=JSON.parse(t);
    let brand = obj.brands? null : obj;
    if(obj.brands){Object.assign(DATA.brands,obj.brands);(obj.order||Object.keys(obj.brands)).forEach(id=>{if(!DATA.order.includes(id))DATA.order.push(id);});}
    else{if(!brand.id){alert('Brand JSON needs an "id" field.');return;}
      DATA.brands[brand.id]=brand;if(!DATA.order.includes(brand.id))DATA.order.push(brand.id);}
    persist();const newId=obj.brands?(obj.order?obj.order[0]:Object.keys(obj.brands)[0]):brand.id;
    setBrand(newId);showTab('tab-overview',document.querySelector('.tab'));closeImport();
  }catch(e){alert('Invalid JSON: '+e.message);}
}
function fileImport(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{document.getElementById('importText').value=r.result;};r.readAsText(f);}
function exportAll(){const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='sentiment_hub_brands.json';a.click();}
function resetHub(){if(confirm('Clear imported brands and reload the seeded set?')){localStorage.removeItem(LS_KEY);location.reload();}}

/* ---------- INIT ---------- */
loadSaved();
state.active=DATA.order[0];
buildSwitcher();
document.getElementById('brandSel').addEventListener('change',e=>{setBrand(e.target.value);
  showTab('tab-overview',document.querySelector('.tab'));});
setBrand(state.active);
showTab('tab-overview',document.querySelector('.tab'));
</script>
